<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your App Landing Zone - AWS Workshop</title>
    <style>
        :root {
            --awsui-color-aws-squid-ink: #232f3e;
            --awsui-color-amazon-orange: #ff9900;
            --awsui-color-grey-100: #fafafa;
            --awsui-color-grey-300: #d5dbdb;
            --awsui-color-grey-600: #545b64;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: "Amazon Ember", "Helvetica Neue", Roboto, Arial, sans-serif;
            background-color: var(--awsui-color-aws-squid-ink);
            color: var(--awsui-color-grey-100);
        }

        .header {
            text-align: center;
            padding: 2rem 1.5rem 1.5rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .header h1 .orange {
            color: var(--awsui-color-amazon-orange);
        }

        .header p {
            font-size: 0.95rem;
            color: var(--awsui-color-grey-300);
            line-height: 1.5;
        }

        .header p code {
            background: rgba(255, 153, 0, 0.15);
            color: var(--awsui-color-amazon-orange);
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-family: Monaco, Menlo, "Cascadia Code", monospace;
            font-size: 0.85rem;
        }

        .tiger-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1.5rem 1.5rem;
        }

        .tiger-container img {
            max-width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }

        .footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: var(--awsui-color-grey-600);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Your app will land here <span class="orange">🛬</span> Then Tiger goes back to the forest 🌿</h1>
        <p>Build something with Kiro, deploy to <code>public/</code> folder, and it appears right here.</p>
    </div>

    <div class="tiger-container">
        <img src="bengali-tiger-pa1.png" alt="Bengali Tiger - Workshop mascot generated by Amazon Nova Canvas on Amazon Bedrock" />
    </div>

    <div class="footer">
        Vibe Coding &amp; AI Driven Development Workshop &middot; Powered by Kiro on AWS
    </div>
</body>
</html>
