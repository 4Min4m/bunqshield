name: BunqShield CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1

jobs:
  lint-backend:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lint deps
        run: pip install ruff mypy
      - name: ruff
        run: ruff check backend/
      - name: mypy
        run: mypy backend/ --ignore-missing-imports

  lint-frontend:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps (no torch for CI speed)
        run: |
          pip install fastapi uvicorn pydantic httpx pytest pytest-asyncio \
            opencv-python-headless scikit-image Pillow numpy python-multipart
        working-directory: backend
      - name: Run tests
        env:
          DEMO_MODE: 'true'
        run: pytest tests/ -v -m "not gpu"
        working-directory: backend

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/bunqshield-ai-service:$IMAGE_TAG" ./backend
          docker tag "$ECR_REGISTRY/bunqshield-ai-service:$IMAGE_TAG" "$ECR_REGISTRY/bunqshield-ai-service:latest"
          docker push "$ECR_REGISTRY/bunqshield-ai-service:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/bunqshield-ai-service:latest"

  cdk-diff:
    name: CDK Diff (PR only)
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    if: github.event_name == 'pull_request'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm ci
        working-directory: infra
      - name: CDK diff
        id: diff
        run: npx cdk diff 2>&1 | tee /tmp/diff.txt
        working-directory: infra
      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/diff.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## CDK Diff\n```\n' + diff.slice(0, 4000) + '\n```',
            });

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: CDK deploy
        run: |
          npm ci --silent
          npx cdk deploy --require-approval never --context "imageTag=${{ github.sha }}"
        working-directory: infra
      - name: Build frontend
        run: |
          npm ci --silent
          npm run build
        working-directory: frontend
      - name: Upload frontend to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name BunqShieldStack \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucket'].OutputValue" \
            --output text)
          aws s3 sync frontend/dist/ "s3://$BUCKET/" --delete
      - name: Invalidate CloudFront
        run: |
          CF_DIST=$(aws cloudformation describe-stacks \
            --stack-name BunqShieldStack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          aws cloudfront create-invalidation --distribution-id "$CF_DIST" --paths "/*"
